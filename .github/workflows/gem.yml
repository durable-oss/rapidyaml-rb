name: Build and publish gem

on:
  push:
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  # ------------------------------------------------------------------ #
  # Run tests across supported Ruby versions                             #
  # ------------------------------------------------------------------ #
  test:
    name: Test (Ruby ${{ matrix.ruby }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby:
          - "3.1"
          - "3.2"
          - "3.3"

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Compile extension
        run: bundle exec rake compile

      - name: Run tests
        run: bundle exec rake test

  # ------------------------------------------------------------------ #
  # Build precompiled native gems for each platform                      #
  # ------------------------------------------------------------------ #
  native-gems:
    name: Build ${{ matrix.platform }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - x86_64-linux
          - x86_64-linux-musl
          - aarch64-linux
          - aarch64-linux-musl
          - x86_64-darwin
          - arm64-darwin
          - x64-mingw-ucrt

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Build native gem (${{ matrix.platform }})
        run: bundle exec rake gem:${{ matrix.platform }}

      - uses: actions/upload-artifact@v4
        with:
          name: gem-${{ matrix.platform }}
          path: pkg/*.gem

  # ------------------------------------------------------------------ #
  # Build the plain source gem (fallback for unsupported platforms)      #
  # ------------------------------------------------------------------ #
  source-gem:
    name: Build source gem
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - run: bundle exec rake build

      - uses: actions/upload-artifact@v4
        with:
          name: gem-source
          path: pkg/*.gem

  # ------------------------------------------------------------------ #
  # Publish to RubyGems.org and GitHub Packages                         #
  # ------------------------------------------------------------------ #
  publish:
    name: Publish gems
    needs: [test, native-gems, source-gem]
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: gem-*
          path: pkg
          merge-multiple: true

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Publish to RubyGems.org
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
        run: |
          mkdir -p ~/.gem
          cat > ~/.gem/credentials <<EOF
          ---
          :rubygems_api_key: ${GEM_HOST_API_KEY}
          EOF
          chmod 0600 ~/.gem/credentials
          for gem in pkg/*.gem; do
            gem push "$gem" || true
          done

      - name: Publish to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ~/.gem
          cat > ~/.gem/credentials <<EOF
          ---
          :github: Bearer ${GITHUB_TOKEN}
          EOF
          chmod 0600 ~/.gem/credentials
          for gem in pkg/*.gem; do
            gem push \
              --host https://rubygems.pkg.github.com/${{ github.repository_owner }} \
              "$gem" || true
          done
