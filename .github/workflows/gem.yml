name: Build and publish gem

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  # ------------------------------------------------------------------ #
  # Run tests across supported Ruby versions                             #
  # ------------------------------------------------------------------ #
  test:
    name: Test (Ruby ${{ matrix.ruby }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby:
          - "3.1"
          - "3.2"
          - "3.3"

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
          bundler-opts: "--without lint"

      - name: Compile extension
        run: bundle exec rake compile

      - name: Run tests
        run: bundle exec rake test

  # ------------------------------------------------------------------ #
  # Build precompiled native gems for each platform                      #
  # ------------------------------------------------------------------ #
  native-gems:
    name: Build ${{ matrix.platform }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - x86_64-linux
          - x86_64-linux-musl
          - aarch64-linux
          - aarch64-linux-musl
          - arm-linux-gnu
          - arm-linux-musl
          - x64-mingw-ucrt

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          bundler-opts: "--without lint"

      - name: Build native gem (${{ matrix.platform }})
        run: bundle exec rake gem:${{ matrix.platform }}

      - uses: actions/upload-artifact@v4
        with:
          name: gem-${{ matrix.platform }}
          path: pkg/*.gem

  # ------------------------------------------------------------------ #
  # Build darwin gems natively (osxcross can't handle rice 4.1+)        #
  # ------------------------------------------------------------------ #
  native-gems-darwin:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: x86_64-darwin
            runner: macos-13
          - platform: arm64-darwin
            runner: macos-14

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          bundler-opts: "--without lint"

      - name: Compile extension
        run: bundle exec rake compile

      - name: Build native gem (${{ matrix.platform }})
        run: bundle exec rake gem:native

      - uses: actions/upload-artifact@v4
        with:
          name: gem-${{ matrix.platform }}
          path: pkg/*.gem

  # ------------------------------------------------------------------ #
  # Build the plain source gem (fallback for unsupported platforms)      #
  # ------------------------------------------------------------------ #
  source-gem:
    name: Build source gem
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          bundler-opts: "--without lint"

      - run: bundle exec rake gem

      - uses: actions/upload-artifact@v4
        with:
          name: gem-source
          path: pkg/*.gem

  # ------------------------------------------------------------------ #
  # Publish to RubyGems.org via trusted publishing (OIDC)               #
  # ------------------------------------------------------------------ #
  publish:
    name: Publish gems
    if: startsWith(github.ref, 'refs/tags/')
    needs: [test, native-gems, native-gems-darwin, source-gem]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: gem-*
          path: pkg
          merge-multiple: true

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - uses: rubygems/release-gem@v1
